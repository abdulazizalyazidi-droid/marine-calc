<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marine Calc</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00E5FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MarineCalc">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080D18;
    --card: #0f1724;
    --border: rgba(255,255,255,0.07);
    --cyan: #00E5FF;
    --orange: #FF6B35;
    --green: #10B981;
    --yellow: #F59E0B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    min-height: 100dvh;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events:none;
  }

  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 60px; position: relative; z-index:1; }

  /* Header */
  header { display:flex; align-items:center; gap:12px; padding: 16px 0 24px; }
  .logo { font-size:28px; }
  .htext h1 {
    font-family:'Share Tech Mono',monospace;
    font-size:15px; letter-spacing:3px; color:var(--cyan);
  }
  .htext p { font-size:11px; color:rgba(255,255,255,0.3); }

  /* Section title */
  .sec-title {
    font-family:'Share Tech Mono',monospace;
    font-size:11px; letter-spacing:2px;
    color:rgba(255,255,255,0.3);
    margin-bottom:10px;
    padding-left:2px;
  }

  /* Card */
  .card {
    background: var(--card);
    border-radius:20px;
    border: 1px solid var(--border);
    padding: 18px;
    margin-bottom:20px;
  }

  /* Mode tabs */
  .tabs {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:6px; margin-bottom:18px;
  }
  .tab {
    padding:9px 4px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.03);
    font-size:12px; font-weight:700; letter-spacing:0.5px;
    text-align:center; cursor:pointer;
    transition:all 0.2s;
    color:rgba(255,255,255,0.4);
  }
  .tab.active {
    background:rgba(0,229,255,0.1);
    border-color:rgba(0,229,255,0.4);
    color:var(--cyan);
  }

  /* Input group */
  .input-group { margin-bottom:14px; }
  .input-label {
    font-size:11px; letter-spacing:1.5px;
    color:rgba(255,255,255,0.35);
    font-family:'Share Tech Mono',monospace;
    margin-bottom:6px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .input-row { display:flex; gap:8px; align-items:center; }

  input[type=number], input[type=text] {
    flex:1;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    color:#fff;
    padding:12px 14px;
    font-family:'Share Tech Mono',monospace;
    font-size:20px;
    outline:none;
    transition:border-color 0.2s;
    -moz-appearance:textfield;
    width:100%;
  }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance:none; }
  input:focus { border-color:var(--cyan); }
  input::placeholder { color:rgba(255,255,255,0.15); }

  select {
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    color:#fff;
    padding:12px 10px;
    font-family:'Rajdhani',sans-serif;
    font-size:14px; font-weight:600;
    outline:none; cursor:pointer;
    -webkit-appearance:none;
    min-width:72px;
    text-align:center;
  }
  select option { background:#1a2235; }

  /* Time input row */
  .time-row { display:flex; gap:6px; align-items:center; }
  .time-box {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .time-box input { text-align:center; padding:12px 6px; font-size:18px; }
  .time-box span { font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:1px; }
  .time-sep { font-size:22px; color:rgba(255,255,255,0.2); padding-top:2px; }

  /* Calc button */
  .calc-btn {
    width:100%; padding:14px;
    border-radius:12px; border:none;
    background:linear-gradient(135deg, #00bcd4, #00E5FF);
    color:#000; font-family:'Rajdhani',sans-serif;
    font-size:16px; font-weight:700; letter-spacing:2px;
    cursor:pointer; margin-top:6px;
    transition:opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(0,229,255,0.25);
  }
  .calc-btn:active { transform:scale(0.97); opacity:0.85; }

  /* Result box */
  .result-box {
    margin-top:14px;
    background:rgba(0,229,255,0.06);
    border:1px solid rgba(0,229,255,0.2);
    border-radius:14px;
    padding:16px 18px;
    display:none;
  }
  .result-box.show { display:block; }
  .result-label { font-size:11px; font-family:'Share Tech Mono',monospace; color:rgba(255,255,255,0.35); letter-spacing:1.5px; margin-bottom:6px; }
  .result-value { font-family:'Share Tech Mono',monospace; font-size:28px; font-weight:bold; color:var(--cyan); }
  .result-unit { font-size:14px; color:rgba(255,255,255,0.4); margin-left:4px; }
  .result-extra { margin-top:8px; font-size:13px; color:rgba(255,255,255,0.4); font-family:'Share Tech Mono',monospace; }

  /* Compass card */
  .compass-wrap {
    display:flex; flex-direction:column; align-items:center; gap:20px;
  }
  .compass-canvas-wrap { position:relative; width:200px; height:200px; }
  #compass-canvas { width:200px; height:200px; display:block; }

  .bearing-inputs { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .bearing-box { display:flex; flex-direction:column; gap:6px; }
  .bearing-box label { font-size:11px; font-family:'Share Tech Mono',monospace; letter-spacing:1.5px; color:rgba(255,255,255,0.35); }
  .bearing-input-wrap { position:relative; }
  .bearing-input-wrap input {
    width:100%; text-align:center; font-size:24px; padding:14px 8px;
  }
  .bearing-input-wrap .deg-sym {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    font-family:'Share Tech Mono',monospace; font-size:16px; color:rgba(255,255,255,0.3);
  }

  .bearing-result {
    width:100%; background:rgba(16,185,129,0.07);
    border:1px solid rgba(16,185,129,0.25);
    border-radius:14px; padding:14px 18px;
    text-align:center; display:none;
  }
  .bearing-result.show { display:block; }
  .bearing-result .result-label { color:rgba(255,255,255,0.35); }
  .bearing-result .result-value { color:var(--green); font-size:32px; }

  .compass-info {
    display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%;
  }
  .compass-info-box {
    background:rgba(255,255,255,0.04); border-radius:12px;
    padding:10px 14px; border:1px solid var(--border);
    text-align:center;
  }
  .compass-info-box .ci-label { font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:1px; }
  .compass-info-box .ci-value { font-family:'Share Tech Mono',monospace; font-size:18px; color:#fff; margin-top:4px; }
  .compass-info-box .ci-dir { font-size:11px; color:var(--green); }

  .divider { height:1px; background:var(--border); margin:4px 0 14px; }

  /* ── DMS ── */
  .dms-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px;}
  .coord-label{font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:1.5px;color:rgba(255,255,255,0.35);margin-bottom:6px;}
  .dms-parts{display:flex;gap:4px;}
  .dms-part{display:flex;flex-direction:column;align-items:center;flex:1;}
  .dms-part input{width:100%;text-align:center;padding:10px 4px;font-size:16px;}
  .dms-part span{font-size:10px;color:rgba(255,255,255,0.3);font-family:'Share Tech Mono',monospace;margin-top:4px;letter-spacing:1px;}
  .coord-row{display:flex;gap:6px;margin-bottom:14px;align-items:flex-end;}
  .coord-group{flex:1;}
  .hem-sel{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;padding:12px 8px;font-size:15px;font-weight:600;outline:none;cursor:pointer;-webkit-appearance:none;min-width:52px;text-align:center;font-family:'Rajdhani',sans-serif;}
  .dms-rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .dms-rb{background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);border-radius:12px;padding:12px 14px;}
  .dms-rb.gb{background:rgba(16,185,129,0.05);border-color:rgba(16,185,129,0.2);}
  .dms-rl{font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:1.5px;color:rgba(255,255,255,0.3);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .dms-rv{font-family:'Share Tech Mono',monospace;font-size:14px;color:#00E5FF;word-break:break-all;line-height:1.6;}
  .dms-rb.gb .dms-rv{color:#10B981;}
  .cpb{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.25);font-size:12px;padding:0;}
  .cpb:active{color:#00E5FF;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">⚓</div>
    <div class="htext">
      <h1>MARINE CALC</h1>
      <p>Speed · Distance · Time · Bearing</p>
    </div>
  </header>

  <!-- ── Speed / Distance / Time ── -->
  <div class="sec-title">NAVIGATION CALCULATOR</div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="setMode('distance')">📍 Distance</div>
      <div class="tab" onclick="setMode('speed')">🚢 Speed</div>
      <div class="tab" onclick="setMode('time')">⏱ Time</div>
    </div>

    <!-- Speed input -->
    <div class="input-group" id="grp-speed">
      <div class="input-label">SPEED</div>
      <div class="input-row">
        <input type="number" id="inp-speed" placeholder="0" oninput="liveCalc()" min="0" />
        <select id="sel-speed" onchange="liveCalc()">
          <option value="kn">kn</option>
          <option value="kt">kt</option>
          <option value="kmh">km/h</option>
          <option value="mph">mph</option>
          <option value="ms">m/s</option>
        </select>
      </div>
    </div>

    <!-- Distance input -->
    <div class="input-group" id="grp-dist">
      <div class="input-label">DISTANCE</div>
      <div class="input-row">
        <input type="number" id="inp-dist" placeholder="0" oninput="liveCalc()" min="0" />
        <select id="sel-dist" onchange="liveCalc()">
          <option value="nm">nm</option>
          <option value="km">km</option>
          <option value="mi">mi</option>
          <option value="m">m</option>
        </select>
      </div>
    </div>

    <!-- Time input -->
    <div class="input-group" id="grp-time">
      <div class="input-label">TIME</div>
      <div class="time-row">
        <div class="time-box">
          <input type="number" id="inp-h" placeholder="0" min="0" oninput="liveCalc()" />
          <span>HRS</span>
        </div>
        <div class="time-sep">:</div>
        <div class="time-box">
          <input type="number" id="inp-m" placeholder="0" min="0" max="59" oninput="liveCalc()" />
          <span>MIN</span>
        </div>
        <div class="time-sep">:</div>
        <div class="time-box">
          <input type="number" id="inp-s" placeholder="0" min="0" max="59" oninput="liveCalc()" />
          <span>SEC</span>
        </div>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">CALCULATE</button>

    <div class="result-box" id="sdt-result">
      <div class="result-label" id="res-label">RESULT</div>
      <div>
        <span class="result-value" id="res-val">—</span>
        <span class="result-unit" id="res-unit"></span>
      </div>
      <div class="result-extra" id="res-extra"></div>
    </div>
  </div>

  <!-- ── Compass / Bearing ── -->
  <div class="sec-title">COMPASS & BEARING</div>
  <div class="card">
    <div class="compass-wrap">
      <canvas id="compass-canvas" width="200" height="200"></canvas>

      <div class="bearing-inputs">
        <div class="bearing-box">
          <label>BEARING</label>
          <div class="bearing-input-wrap">
            <input type="number" id="inp-bearing" placeholder="090" min="0" max="359"
              oninput="onBearingInput()" />
            <span class="deg-sym">°</span>
          </div>
        </div>
        <div class="bearing-box">
          <label>RECIPROCAL</label>
          <div class="bearing-input-wrap">
            <input type="number" id="inp-recip" placeholder="270" min="0" max="359"
              oninput="onRecipInput()" style="color:var(--green);" />
            <span class="deg-sym">°</span>
          </div>
        </div>
      </div>

      <div class="compass-info">
        <div class="compass-info-box">
          <div class="ci-label">BEARING</div>
          <div class="ci-value" id="ci-bearing">—</div>
          <div class="ci-dir" id="ci-bearing-dir">—</div>
        </div>
        <div class="compass-info-box">
          <div class="ci-label">RECIPROCAL</div>
          <div class="ci-value" id="ci-recip">—</div>
          <div class="ci-dir" id="ci-recip-dir">—</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── MODE ──────────────────────────────────────────────────────────────────────
let mode = 'distance'; // what we're calculating

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['distance','speed','time'][i] === m);
  });
  // Show/hide inputs
  document.getElementById('grp-speed').style.display  = m==='speed'  ? 'none' : '';
  document.getElementById('grp-dist').style.display   = m==='distance'? 'none' : '';
  document.getElementById('grp-time').style.display   = m==='time'   ? 'none' : '';
  document.getElementById('sdt-result').classList.remove('show');
}

// ── UNIT CONVERSIONS ──────────────────────────────────────────────────────────
function speedToKnots(v, unit) {
  if (unit==='kn'||unit==='kt') return v;
  if (unit==='kmh') return v / 1.852;
  if (unit==='mph') return v / 1.15078;
  if (unit==='ms')  return v / 0.514444;
  return v;
}
function knotsToUnit(v, unit) {
  if (unit==='kn'||unit==='kt') return v;
  if (unit==='kmh') return v * 1.852;
  if (unit==='mph') return v * 1.15078;
  if (unit==='ms')  return v * 0.514444;
  return v;
}
function distToNm(v, unit) {
  if (unit==='nm') return v;
  if (unit==='km') return v / 1.852;
  if (unit==='mi') return v / 1.15078;
  if (unit==='m')  return v / 1852;
  return v;
}
function nmToDist(v, unit) {
  if (unit==='nm') return v;
  if (unit==='km') return v * 1.852;
  if (unit==='mi') return v * 1.15078;
  if (unit==='m')  return v * 1852;
  return v;
}

function getTimeSec() {
  const h = parseFloat(document.getElementById('inp-h').value)||0;
  const m = parseFloat(document.getElementById('inp-m').value)||0;
  const s = parseFloat(document.getElementById('inp-s').value)||0;
  return h*3600 + m*60 + s;
}

function fmtTime(sec) {
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = Math.round(sec%60);
  return `${h}h ${m}m ${s}s`;
}

function fmt(n, dec=3) {
  if (!isFinite(n)||isNaN(n)) return '—';
  return parseFloat(n.toFixed(dec)).toLocaleString();
}

function calculate() {
  const speedRaw = parseFloat(document.getElementById('inp-speed').value)||0;
  const distRaw  = parseFloat(document.getElementById('inp-dist').value)||0;
  const speedUnit = document.getElementById('sel-speed').value;
  const distUnit  = document.getElementById('sel-dist').value;
  const timeSec   = getTimeSec();
  const timeHr    = timeSec / 3600;

  const speedKn = speedToKnots(speedRaw, speedUnit);
  const distNm  = distToNm(distRaw, distUnit);

  const resBox = document.getElementById('sdt-result');
  const resLabel = document.getElementById('res-label');
  const resVal  = document.getElementById('res-val');
  const resUnit = document.getElementById('res-unit');
  const resExtra = document.getElementById('res-extra');

  if (mode === 'distance') {
    if (!speedKn || !timeHr) { alert('Enter speed and time'); return; }
    const nm = speedKn * timeHr;
    resLabel.textContent = 'DISTANCE';
    resVal.textContent = fmt(nm);
    resUnit.textContent = 'nm';
    resExtra.textContent =
      `= ${fmt(nmToDist(nm,'km'))} km  |  ${fmt(nmToDist(nm,'mi'))} mi`;
  }
  else if (mode === 'speed') {
    if (!distNm || !timeHr) { alert('Enter distance and time'); return; }
    const kn = distNm / timeHr;
    resLabel.textContent = 'SPEED';
    resVal.textContent = fmt(knotsToUnit(kn, speedUnit), 2);
    resUnit.textContent = speedUnit==='kt'?'kt':speedUnit;
    resExtra.textContent =
      `= ${fmt(kn,2)} kn  |  ${fmt(knotsToUnit(kn,'kmh'),2)} km/h  |  ${fmt(knotsToUnit(kn,'mph'),2)} mph`;
  }
  else if (mode === 'time') {
    if (!speedKn || !distNm) { alert('Enter speed and distance'); return; }
    const sec = (distNm / speedKn) * 3600;
    resLabel.textContent = 'TIME';
    resVal.textContent = fmtTime(sec);
    resUnit.textContent = '';
    resExtra.textContent = `= ${fmt(sec/3600, 4)} hours`;
  }

  resBox.classList.add('show');
}

function liveCalc() {
  // live calc only if all two inputs are filled for the current mode
  const speedRaw = parseFloat(document.getElementById('inp-speed').value);
  const distRaw  = parseFloat(document.getElementById('inp-dist').value);
  const timeSec  = getTimeSec();
  const hasSpeed = !isNaN(speedRaw) && speedRaw > 0;
  const hasDist  = !isNaN(distRaw) && distRaw > 0;
  const hasTime  = timeSec > 0;

  if (mode==='distance' && hasSpeed && hasTime) calculate();
  if (mode==='speed'    && hasDist  && hasTime) calculate();
  if (mode==='time'     && hasSpeed && hasDist) calculate();
}

// ── COMPASS ───────────────────────────────────────────────────────────────────
function degToDir(d) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(d/22.5) % 16];
}

function reciprocal(d) { return (d + 180) % 360; }

function onBearingInput() {
  let v = parseFloat(document.getElementById('inp-bearing').value);
  if (isNaN(v)) { drawCompass(null); clearCompassInfo(); return; }
  v = ((v % 360) + 360) % 360;
  const r = reciprocal(v);
  document.getElementById('inp-recip').value = r;
  updateCompassInfo(v, r);
  drawCompass(v);
}

function onRecipInput() {
  let v = parseFloat(document.getElementById('inp-recip').value);
  if (isNaN(v)) { drawCompass(null); clearCompassInfo(); return; }
  v = ((v % 360) + 360) % 360;
  const b = reciprocal(v);
  document.getElementById('inp-bearing').value = b;
  updateCompassInfo(b, v);
  drawCompass(b);
}

function updateCompassInfo(b, r) {
  document.getElementById('ci-bearing').textContent = b.toFixed(0).padStart(3,'0') + '°';
  document.getElementById('ci-bearing-dir').textContent = degToDir(b);
  document.getElementById('ci-recip').textContent = r.toFixed(0).padStart(3,'0') + '°';
  document.getElementById('ci-recip-dir').textContent = degToDir(r);
}

function clearCompassInfo() {
  ['ci-bearing','ci-recip','ci-bearing-dir','ci-recip-dir'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
}

function drawCompass(bearing) {
  const canvas = document.getElementById('compass-canvas');
  const ctx = canvas.getContext('2d');
  const W = 200, H = 200;
  const cx = W/2, cy = H/2, R = 88;
  ctx.clearRect(0,0,W,H);

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,229,255,0.15)';
  ctx.lineWidth = 2; ctx.stroke();

  // Tick marks
  for(let i=0;i<360;i+=5) {
    const a = (i-90) * Math.PI/180;
    const major = i%90===0, mid = i%45===0;
    const r1 = R - (major?16:mid?10:5);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1, cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*(R-1), cy+Math.sin(a)*(R-1));
    ctx.strokeStyle = major ? 'rgba(0,229,255,0.7)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = major ? 2 : 1; ctx.stroke();
  }

  // Cardinal labels
  const cardinals = ['N','E','S','W'];
  ctx.font = 'bold 13px Rajdhani, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  cardinals.forEach((c,i) => {
    const a = (i*90-90)*Math.PI/180;
    const r = R-24;
    ctx.fillStyle = c==='N' ? '#FF6B35' : 'rgba(255,255,255,0.7)';
    ctx.fillText(c, cx+Math.cos(a)*r, cy+Math.sin(a)*r);
  });

  // Inner circle
  ctx.beginPath();
  ctx.arc(cx,cy,R*0.6,0,Math.PI*2);
  ctx.fillStyle = 'rgba(0,229,255,0.03)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,229,255,0.1)'; ctx.lineWidth=1; ctx.stroke();

  if (bearing === null || bearing === undefined) {
    // Center dot
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
    return;
  }

  const r = reciprocal(bearing);

  // Draw bearing arrow (cyan)
  drawArrow(ctx, cx, cy, bearing, R*0.55, '#00E5FF', 3);

  // Draw reciprocal arrow (green)
  drawArrow(ctx, cx, cy, r, R*0.55, '#10B981', 2);

  // Dashed line connecting them
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  const ba = (bearing-90)*Math.PI/180;
  const ra = (r-90)*Math.PI/180;
  ctx.moveTo(cx+Math.cos(ba)*R*0.55, cy+Math.sin(ba)*R*0.55);
  ctx.lineTo(cx+Math.cos(ra)*R*0.55, cy+Math.sin(ra)*R*0.55);
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; ctx.stroke();
  ctx.setLineDash([]);

  // Center dot
  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
}

function drawArrow(ctx, cx, cy, deg, len, color, lw) {
  const a = (deg-90)*Math.PI/180;
  const tx = cx + Math.cos(a)*len;
  const ty = cy + Math.sin(a)*len;

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(tx, ty);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Arrowhead
  const headLen = 10, headAngle = Math.PI/6;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - headLen*Math.cos(a-headAngle), ty - headLen*Math.sin(a-headAngle));
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - headLen*Math.cos(a+headAngle), ty - headLen*Math.sin(a+headAngle));
  ctx.stroke();

  ctx.shadowBlur = 0;
}


// ── DMS / DD ──────────────────────────────────────────────────────────────────
let dmsMode = 'dms2dd';

function setDmsMode(m) {
  dmsMode = m;
  document.getElementById('tab-dms2dd').classList.toggle('active', m==='dms2dd');
  document.getElementById('tab-dd2dms').classList.toggle('active', m==='dd2dms');
  document.getElementById('panel-dms2dd').style.display = m==='dms2dd' ? '' : 'none';
  document.getElementById('panel-dd2dms').style.display = m==='dd2dms' ? '' : 'none';
}

function dmsToDD(d, m, s, hem) {
  const sign = (hem==='S'||hem==='W') ? -1 : 1;
  return sign * (Math.abs(d) + m/60 + s/3600);
}

function ddToDMS(dd) {
  const abs = Math.abs(dd);
  const d = Math.floor(abs);
  const mFull = (abs - d) * 60;
  const m = Math.floor(mFull);
  const s = ((mFull - m) * 60).toFixed(2);
  return { d, m, s };
}

function fmtDMS(d, m, s, hem) {
  return d + '° ' + m + "' " + s + '" ' + hem;
}

function dmsConvert() {
  const latD = parseFloat(document.getElementById('lat-d').value)||0;
  const latM = parseFloat(document.getElementById('lat-m').value)||0;
  const latS = parseFloat(document.getElementById('lat-s').value)||0;
  const latH = document.getElementById('lat-hem').value;
  const lonD = parseFloat(document.getElementById('lon-d').value)||0;
  const lonM = parseFloat(document.getElementById('lon-m').value)||0;
  const lonS = parseFloat(document.getElementById('lon-s').value)||0;
  const lonH = document.getElementById('lon-hem').value;

  if (!latD && !latM && !latS && !lonD && !lonM && !lonS) return;

  const latDD = dmsToDD(latD, latM, latS, latH);
  const lonDD = dmsToDD(lonD, lonM, lonS, lonH);

  document.getElementById('dd-lat-val').textContent = latDD.toFixed(6) + '°';
  document.getElementById('dd-lon-val').textContent = lonDD.toFixed(6) + '°';
  document.getElementById('dd-full-val').textContent = latDD.toFixed(6) + ', ' + lonDD.toFixed(6);
  document.getElementById('dms2dd-result').style.display = 'grid';
}

function ddConvert() {
  const latDD = parseFloat(document.getElementById('dd-lat').value);
  const lonDD = parseFloat(document.getElementById('dd-lon').value);
  if (isNaN(latDD) || isNaN(lonDD)) return;

  const latH = latDD >= 0 ? 'N' : 'S';
  const lonH = lonDD >= 0 ? 'E' : 'W';
  const lat = ddToDMS(latDD);
  const lon = ddToDMS(lonDD);

  const latStr = fmtDMS(lat.d, lat.m, lat.s, latH);
  const lonStr = fmtDMS(lon.d, lon.m, lon.s, lonH);

  document.getElementById('dms-lat-val').textContent = latStr;
  document.getElementById('dms-lon-val').textContent = lonStr;
  document.getElementById('dms-full-val').textContent = latStr + '\n' + lonStr;
  document.getElementById('dd2dms-result').style.display = 'grid';
}

function copyText(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}
